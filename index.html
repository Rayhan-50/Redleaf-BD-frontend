<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Redleaf BD — Premium Natural &amp; Organic Products in Bangladesh</title>
    <meta name="description" content="Shop premium honey, halal meat, organic rice, superfoods, spices and more from Redleaf BD — Bangladesh's trusted natural food brand since 2013." />
    <meta name="theme-color" content="#dc2626" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Redleaf BD — Premium Natural &amp; Organic Products" />
    <meta property="og:description" content="Shop premium natural &amp; organic products — honey, meat, rice, spices, superfoods and more. Trusted by 400K+ customers." />
    <meta property="og:site_name" content="Redleaf BD" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- DNS prefetch for third-party origins (free, near-zero cost) -->
    <link rel="dns-prefetch" href="https://ik.imagekit.io" />
    <link rel="dns-prefetch" href="https://api.imgbb.com" />
    <link rel="dns-prefetch" href="https://api.stripe.com" />

    <!-- Preconnect for critical third-party origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://ik.imagekit.io" crossorigin />

    <!-- Google Fonts — Poppins (display=swap avoids FOIT) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
